<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VOID RUNNER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #10101a;
      --panel: #14141f;
      --accent: #00ffcc;
      --accent2: #ff2d78;
      --accent3: #7b2fff;
      --text: #e0e0f0;
      --muted: #555570;
      --runner: #00ffcc;
      --obstacle: #ff2d78;
      --ground: #1e1e30;
      --star: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Noise grain */
    body::after {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 99;
      opacity: 0.4;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(24px, 4vw, 42px);
      letter-spacing: 8px;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0,255,204,0.6), 0 0 60px rgba(0,255,204,0.2);
    }

    h1 span {
      color: var(--accent2);
      text-shadow: 0 0 30px rgba(255,45,120,0.6);
    }

    #game-container {
      position: relative;
      width: min(760px, 96vw);
    }

    /* HUD */
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid rgba(0,255,204,0.2);
      border-bottom: none;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .hud-item { display: flex; flex-direction: column; gap: 2px; }
    .hud-label { color: var(--muted); font-size: 10px; letter-spacing: 3px; }
    .hud-value {
      color: var(--accent);
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      min-width: 60px;
      text-align: right;
    }
    .hud-value.hi { color: var(--accent2); }

    /* Canvas */
    #gameCanvas {
      display: block;
      background: var(--surface);
      border: 1px solid rgba(0,255,204,0.15);
      border-top: 1px solid rgba(0,255,204,0.3);
      width: 100%;
      image-rendering: pixelated;
    }

    /* Footer bar */
    #footer-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: var(--panel);
      border: 1px solid rgba(0,255,204,0.2);
      border-top: none;
      width: 100%;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    #speed-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #speed-bar-track {
      width: 80px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    #speed-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent3), var(--accent));
      border-radius: 2px;
      width: 10%;
      transition: width 0.5s ease;
    }

    /* Overlay */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(2px);
      z-index: 10;
      transition: opacity 0.3s;
    }

    #overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--text);
    }
    .overlay-title.gameover { color: var(--accent2); text-shadow: 0 0 20px rgba(255,45,120,0.7); }

    .overlay-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 3px;
      text-align: center;
      line-height: 1.8;
    }

    #start-btn {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      padding: 12px 36px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, box-shadow 0.2s;
    }

    #start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.2s ease;
      z-index: -1;
    }

    #start-btn:hover {
      color: var(--bg);
      box-shadow: 0 0 30px rgba(0,255,204,0.4);
    }
    #start-btn:hover::before { transform: translateX(0); }

    .flash {
      animation: flash 0.15s ease;
    }
    @keyframes flash {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
<div id="wrapper">
  <header>
    <h1>VOID <span>RUNNER</span></h1>
  </header>

  <div id="game-container">
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score-display">0000</span>
      </div>
      <div class="hud-item" style="text-align:right">
        <span class="hud-label">BEST</span>
        <span class="hud-value hi" id="hi-display">0000</span>
      </div>
    </div>

    <div style="position:relative;">
      <canvas id="gameCanvas" width="760" height="220"></canvas>
      <div id="overlay">
        <div class="overlay-title" id="overlay-title">VOID RUNNER</div>
        <div class="overlay-sub" id="overlay-sub">
          PRESS SPACE OR TAP TO BEGIN<br>DODGE THE INCOMING ANOMALIES
        </div>
        <button id="start-btn">INITIALIZE</button>
      </div>
    </div>

    <div id="footer-bar">
      <span>SPACE / TAP TO JUMP</span>
      <div id="speed-bar-wrap">
        <span>SPD</span>
        <div id="speed-bar-track"><div id="speed-bar-fill"></div></div>
      </div>
      <span id="level-display">LVL 01</span>
    </div>


  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const GROUND_Y = H - 40;
const GROUND_LINE = GROUND_Y + 32;
const RUNNER_X = 80;
const GRAVITY = 0.55;
const JUMP_FORCE = -13;
const DOUBLE_JUMP_FORCE = -11;

// Colors
const C = {
  bg: '#0a0a0f',
  surface: '#10101a',
  accent: '#00ffcc',
  accent2: '#ff2d78',
  accent3: '#7b2fff',
  muted: '#555570',
  ground: '#1e1e30',
  groundLine: '#2a2a45',
  text: '#e0e0f0',
};

// State
let state = 'idle'; // idle | running | dead
let score = 0;
let hiScore = parseInt(localStorage.getItem('voidrunner_hi') || '0');
let frame = 0;
let speed = 5;
let level = 1;
let animFrame;

// Runner — body height + leg height together reach GROUND_LINE
const LEG_H = 10;
const runner = {
  x: RUNNER_X,
  y: GROUND_LINE - 32 - LEG_H,
  w: 24,
  h: 32,
  vy: 0,
  onGround: true,
  jumps: 0,
  legPhase: 0,
  trail: [],

  jump() {
    if (this.onGround) {
      this.vy = JUMP_FORCE;
      this.onGround = false;
      this.jumps = 1;
      spawnParticles(this.x + this.w / 2, this.y + this.h + LEG_H, C.accent, 6);
    } else if (this.jumps < 2) {
      this.vy = DOUBLE_JUMP_FORCE;
      this.jumps = 2;
      spawnParticles(this.x + this.w / 2, this.y + this.h / 2, C.accent3, 8);
    }
  },

  update() {
    this.trail.unshift({ x: this.x, y: this.y, alpha: 0.4 });
    if (this.trail.length > 8) this.trail.pop();
    this.trail.forEach(t => t.alpha *= 0.75);

    this.vy += GRAVITY;
    this.y += this.vy;
    const floorY = GROUND_LINE - this.h - LEG_H;
    if (this.y >= floorY) {
      this.y = floorY;
      this.vy = 0;
      this.onGround = true;
      this.jumps = 0;
    }
    if (this.onGround) this.legPhase += speed * 0.08;
  },

  draw() {
    // Trail
    this.trail.forEach((t, i) => {
      ctx.save();
      ctx.globalAlpha = t.alpha * (1 - i / this.trail.length);
      ctx.fillStyle = C.accent3;
      ctx.shadowColor = C.accent3;
      ctx.shadowBlur = 6;
      ctx.fillRect(t.x + 4, t.y + 4, this.w - 8, this.h - 8);
      ctx.restore();
    });

    const cx = this.x + this.w / 2;
    const cy = this.y;
    const footY = cy + this.h + LEG_H; // feet move with the runner

    ctx.save();
    ctx.shadowColor = C.accent;
    ctx.shadowBlur = 20;

    // Body
    ctx.fillStyle = C.surface;
    ctx.fillRect(this.x, cy, this.w, this.h);
    // Outline
    ctx.strokeStyle = C.accent;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(this.x + 0.75, cy + 0.75, this.w - 1.5, this.h - 1.5);

    // Visor
    ctx.fillStyle = C.accent;
    ctx.globalAlpha = 0.9;
    ctx.fillRect(this.x + 5, cy + 6, this.w - 10, 8);
    ctx.globalAlpha = 1;

    // Inner visor glow
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.4;
    ctx.fillRect(this.x + 7, cy + 8, 4, 3);
    ctx.globalAlpha = 1;

    // Core dot
    ctx.fillStyle = C.accent;
    ctx.beginPath();
    ctx.arc(cx, cy + 22, 3, 0, Math.PI * 2);
    ctx.fill();

    // Legs — from body bottom down to footY
    const kick = Math.sin(this.legPhase);
    ctx.strokeStyle = C.accent;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(this.x + 6, cy + this.h);
    ctx.lineTo(this.x + 6 + kick * 5, footY);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(this.x + this.w - 6, cy + this.h);
    ctx.lineTo(this.x + this.w - 6 - kick * 5, footY);
    ctx.stroke();

    ctx.restore();
  },

  getBox() {
    return { x: this.x + 3, y: this.y + 2, w: this.w - 6, h: this.h + LEG_H - 2 };
  }
};

// Obstacles
let obstacles = [];
const OBS_TYPES = [
  // tall spike
  { w: 18, h: 40, color: C.accent2, shape: 'spike' },
  // short spike
  { w: 18, h: 26, color: C.accent2, shape: 'spike' },
  // double spike
  { w: 38, h: 32, color: C.accent2, shape: 'double' },
  // triple spike
  { w: 56, h: 32, color: C.accent2, shape: 'triple' },
];

let nextObsDist = 0;

function spawnObstacle() {
  const type = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
  obstacles.push({
    x: W + 10,
    y: GROUND_LINE - type.h,
    w: type.w,
    h: type.h,
    color: type.color,
    shape: type.shape,
    pulse: 0,
  });
  const minGap = Math.max(220 - score * 0.05, 140);
  nextObsDist = minGap + Math.random() * 180;
}

function drawObstacle(o) {
  o.pulse = (o.pulse + 0.1) % (Math.PI * 2);
  const glow = 10 + Math.sin(o.pulse) * 5;

  ctx.save();
  ctx.shadowColor = o.color;
  ctx.shadowBlur = glow;
  ctx.fillStyle = o.color;

  const drawSpike = (sx, sy, sw, sh) => {
    ctx.beginPath();
    ctx.moveTo(sx + sw / 2, sy);
    ctx.lineTo(sx + sw, sy + sh);
    ctx.lineTo(sx, sy + sh);
    ctx.closePath();
    ctx.fill();
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.25;
    ctx.stroke();
    ctx.restore();
  };

  if (o.shape === 'spike') {
    drawSpike(o.x, o.y, o.w, o.h);
  } else if (o.shape === 'double') {
    const sw = o.w / 2;
    for (let i = 0; i < 2; i++) drawSpike(o.x + i * sw, o.y, sw - 1, o.h);
  } else if (o.shape === 'triple') {
    const sw = o.w / 3;
    for (let i = 0; i < 3; i++) drawSpike(o.x + i * sw, o.y, sw - 1, o.h);
  }

  ctx.restore();
}

function obsBox(o) {
  return { x: o.x + 2, y: o.y + 2, w: o.w - 4, h: o.h - 4 };
}

// Stars
const stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * W,
  y: Math.random() * (GROUND_Y - 20),
  r: Math.random() * 1.2 + 0.3,
  speed: Math.random() * 0.4 + 0.1,
  alpha: Math.random() * 0.5 + 0.3,
  twinkle: Math.random() * Math.PI * 2,
}));

function drawStars() {
  stars.forEach(s => {
    s.twinkle += 0.03;
    s.x -= s.speed * (speed / 5);
    if (s.x < 0) { s.x = W; s.y = Math.random() * (GROUND_Y - 20); }
    ctx.save();
    ctx.globalAlpha = s.alpha * (0.7 + 0.3 * Math.sin(s.twinkle));
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// Ground
let groundOffset = 0;
const groundSegments = [];

function initGround() {
  groundSegments.length = 0;
  for (let i = 0; i < 40; i++) {
    groundSegments.push({
      x: i * 20,
      dotted: Math.random() < 0.3,
      h: 1 + Math.floor(Math.random() * 2),
    });
  }
}
initGround();

function drawGround() {
  groundOffset = (groundOffset + speed) % 20;

  // Ground base
  ctx.fillStyle = C.ground;
  ctx.fillRect(0, GROUND_LINE, W, H - GROUND_LINE);

  // Ground top line glow
  ctx.save();
  ctx.shadowColor = C.accent;
  ctx.shadowBlur = 8;
  ctx.strokeStyle = C.accent;
  ctx.globalAlpha = 0.5;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_LINE);
  ctx.lineTo(W, GROUND_LINE);
  ctx.stroke();
  ctx.restore();

  // Moving grid lines on ground
  ctx.save();
  ctx.strokeStyle = C.groundLine;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < W / 20 + 2; i++) {
    const x = i * 20 - groundOffset;
    ctx.beginPath();
    ctx.moveTo(x, GROUND_LINE);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  ctx.restore();
}

// Particles
let particles = [];

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      alpha: 1,
      color,
      r: Math.random() * 3 + 1,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.alpha > 0.02);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.alpha *= 0.88;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// Collision
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// HUD update
const scoreEl = document.getElementById('score-display');
const hiEl = document.getElementById('hi-display');
const levelEl = document.getElementById('level-display');
const speedFill = document.getElementById('speed-bar-fill');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub = document.getElementById('overlay-sub');
const startBtn = document.getElementById('start-btn');

function updateHUD() {
  scoreEl.textContent = String(Math.floor(score)).padStart(4, '0');
  hiEl.textContent = String(hiScore).padStart(4, '0');
  levelEl.textContent = `LVL ${String(level).padStart(2, '0')}`;
  const pct = Math.min(((speed - 5) / 10) * 100, 100);
  speedFill.style.width = pct + '%';
}

// Flash effect on death
function flashScreen() {
  const gc = document.getElementById('game-container');
  gc.classList.add('flash');
  setTimeout(() => gc.classList.remove('flash'), 150);
}

// Main loop
function loop() {
  frame++;
  ctx.clearRect(0, 0, W, H);

  // Bg
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawGround();

  if (state === 'running') {
    score += speed * 0.04;
    if (score > hiScore) hiScore = Math.floor(score);

    // Level up every 200 pts
    level = Math.floor(score / 200) + 1;
    speed = 5 + level * 0.6;
    if (speed > 15) speed = 15;

    runner.update();

    // Obstacle spawn
    nextObsDist -= speed;
    if (nextObsDist <= 0) spawnObstacle();

    // Move & check obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= speed;
      if (obstacles[i].x + obstacles[i].w < 0) {
        obstacles.splice(i, 1);
        continue;
      }
      if (rectsOverlap(runner.getBox(), obsBox(obstacles[i]))) {
        die();
        break;
      }
      drawObstacle(obstacles[i]);
    }

    runner.draw();
    updateParticles();
    updateHUD();

  } else {
    // Idle / dead — still draw runner statically
    runner.draw();
    updateParticles();
  }

  animFrame = requestAnimationFrame(loop);
}

function startGame() {
  score = 0;
  speed = 5;
  level = 1;
  obstacles = [];
  nextObsDist = 300;
  runner.y = GROUND_LINE - runner.h - LEG_H;
  runner.vy = 0;
  runner.onGround = true;
  runner.jumps = 0;
  runner.trail = [];
  particles = [];
  frame = 0;
  state = 'running';
  overlay.classList.add('hidden');
  cancelAnimationFrame(animFrame);
  loop();
}

function die() {
  state = 'dead';
  if (Math.floor(score) > hiScore) {
    hiScore = Math.floor(score);
    localStorage.setItem('voidrunner_hi', hiScore);
  }
  spawnParticles(runner.x + runner.w / 2, runner.y + runner.h / 2, C.accent2, 20);
  flashScreen();

  setTimeout(() => {
    state = 'waiting'; // block all input until button is clicked
    overlayTitle.textContent = 'TERMINATED';
    overlayTitle.className = 'overlay-title gameover';
    overlaySub.innerHTML = `SCORE: ${String(Math.floor(score)).padStart(4,'0')}&nbsp;&nbsp;&nbsp;BEST: ${String(hiScore).padStart(4,'0')}`;
    startBtn.textContent = 'RETRY';
    overlay.classList.remove('hidden');
    updateHUD();
  }, 400);
}

// Input
function handleJump() {
  if (state === 'running') {
    runner.jump();
  }
}

function handleStart() {
  if (state === 'idle' || state === 'waiting') {
    startGame();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    handleJump();
  }
});

canvas.addEventListener('click', handleJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleJump(); }, { passive: false });
startBtn.addEventListener('click', handleStart);

// Init
hiEl.textContent = String(hiScore).padStart(4, '0');
loop();
</script>
</body>
</html>
